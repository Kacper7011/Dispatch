<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>{{XTERM_CSS}}</style>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d1117; }
    #terminal { width: 100%; height: 100%; padding: 4px; }
    .xterm { height: 100%; }
    .xterm-viewport { background: #0d1117 !important; }
  </style>
</head>
<body>
<div id="terminal"></div>
<script>{{XTERM_JS}}</script>
<script>
  const term = new Terminal({
    theme: {
      background:    '#0d1117',
      foreground:    '#e6edf3',
      cursor:        '#58a6ff',
      cursorAccent:  '#0d1117',
      selectionBackground: '#264f7899',
      // Normal ANSI colors 0–7
      black:         '#1c2128',
      red:           '#ff5555',
      green:         '#3fb950',
      yellow:        '#d29922',
      blue:          '#388bfd',
      magenta:       '#a371f7',
      cyan:          '#39c5cf',
      white:         '#e6edf3',
      // Bright ANSI colors 8–15
      brightBlack:   '#484f58',
      brightRed:     '#ff7b72',
      brightGreen:   '#56d364',
      brightYellow:  '#e3b341',
      brightBlue:    '#79c0ff',
      brightMagenta: '#d2a8ff',
      brightCyan:    '#56d4dc',
      brightWhite:   '#ffffff',
    },
    fontFamily: '"JetBrains Mono", "Cascadia Code", "Fira Code", monospace',
    fontSize: 13,
    lineHeight: 1.2,
    cursorBlink: true,
    cursorStyle: 'block',
    scrollback: 5000,
    allowTransparency: false,
    convertEol: false,
  });

  term.open(document.getElementById('terminal'));

  // Forward keystrokes and clipboard pastes to Java
  term.onData(data => {
    if (window.javaTerminal) {
      window.javaTerminal.sendInput(data);
    }
  });

  // Copy selected text to the system clipboard via the Java bridge.
  // navigator.clipboard is unavailable in WebView (no secure context).
  term.onSelectionChange(() => {
    const sel = term.getSelection();
    if (sel && window.javaTerminal) {
      window.javaTerminal.copyToClipboard(sel);
    }
  });

  // Notify Java of the current terminal size (cols x rows).
  // Called both by term.onResize and explicitly after javaTerminal is registered.
  function notifyResize() {
    if (window.javaTerminal) {
      window.javaTerminal.resize(term.cols, term.rows);
    }
  }

  // Forward every xterm.js resize to the SSH PTY (fires after term.resize() settles).
  term.onResize(() => notifyResize());

  // Recalculate cols/rows from pixel dimensions when the container changes size.
  // Does NOT call notifyResize() directly — term.onResize handles that.
  const resizeObserver = new ResizeObserver(() => {
    const container = document.getElementById('terminal');
    const charWidth  = term._core._renderService.dimensions.css.cell.width;
    const charHeight = term._core._renderService.dimensions.css.cell.height;
    if (charWidth > 0 && charHeight > 0) {
      const cols = Math.max(1, Math.floor(container.clientWidth  / charWidth));
      const rows = Math.max(1, Math.floor(container.clientHeight / charHeight));
      if (cols !== term.cols || rows !== term.rows) {
        term.resize(cols, rows);
      }
    }
  });
  resizeObserver.observe(document.getElementById('terminal'));

  // Expose for Java to call term.write()
  window.term = term;
</script>
</body>
</html>

name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos
          - os: ubuntu-latest
            label: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      # Windows: WiX Toolset 3.x is required by jpackage to produce .exe installers.
      # windows-latest may ship with WiX already, but we install explicitly for reliability.
      - name: Install WiX Toolset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install wixtoolset --no-progress -y

      # macOS: generate dispatch.icns from dispatch.png using sips + iconutil
      # (both tools are built into every macOS runner — no extra install needed).
      - name: Generate dispatch.icns (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ICONSET=dispatch.iconset
          SRC=src/main/resources/img/dispatch.png
          DST=src/main/resources/img/dispatch.icns
          mkdir -p "$ICONSET"
          for SIZE in 16 32 64 128 256 512; do
            sips -z $SIZE $SIZE "$SRC" --out "$ICONSET/icon_${SIZE}x${SIZE}.png"  > /dev/null
            sips -z $((SIZE * 2)) $((SIZE * 2)) "$SRC" --out "$ICONSET/icon_${SIZE}x${SIZE}@2x.png" > /dev/null
          done
          iconutil -c icns "$ICONSET" -o "$DST"
          rm -rf "$ICONSET"

      # Linux: fakeroot is required by jpackage to build .deb packages without root.
      - name: Install fakeroot (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y fakeroot

      - name: Grant execute permission for gradlew
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build installer
        shell: bash
        run: ./gradlew jpackage -PappVersion=${{ steps.version.outputs.VERSION }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.label }}
          path: |
            build/jpackage/*.exe
            build/jpackage/*.dmg
            build/jpackage/*.deb
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: installers
          merge-multiple: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installers/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
